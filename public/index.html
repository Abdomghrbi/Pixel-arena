<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Arena 🎮</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            background: #16213e;
        }
        #chatBox {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        #chatInput {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            font-size: 16px;
        }
        #sendBtn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        #messages {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            max-height: 150px;
            overflow-y: auto;
            pointer-events: none;
            z-index: 50;
        }
        .msg {
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 10px;
            margin: 2px 0;
            border-radius: 5px;
            font-size: 14px;
        }
        #playerCount {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #e94560;
            font-weight: bold;
            font-size: 18px;
            z-index: 50;
        }
        #controls {
            position: fixed;
            bottom: 80px;
            right: 20px;
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 5px;
            z-index: 100;
        }
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(233, 69, 96, 0.6);
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .control-btn:active, .control-btn.pressed { 
            background: rgba(233, 69, 96, 0.9); 
            transform: scale(0.95);
        }
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        #connectionStatus {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="playerCount">👥 0 لاعب</div>
    
    <div id="messages"></div>
    
    <div id="connectionStatus">🔄 جاري الاتصال...</div>
    
    <div id="controls">
        <button class="control-btn" id="btnUp" ontouchstart="return false;">↑</button>
        <button class="control-btn" id="btnLeft" ontouchstart="return false;">←</button>
        <button class="control-btn" id="btnRight" ontouchstart="return false;">→</button>
        <button class="control-btn" id="btnDown" ontouchstart="return false;">↓</button>
    </div>
    
    <div id="chatBox">
        <input type="text" id="chatInput" placeholder="اكتب رسالة..." maxlength="100">
        <button id="sendBtn">إرسال</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ملء الشاشة
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        
        // الاتصال بالسيرفر
        const socket = io({
            transports: ['polling', 'websocket'],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });
        
        let myId = null;
        let players = {};
        let messages = [];
        
        // حجم اللاعب
        const PLAYER_SIZE = 30;
        const SPEED = 5;
        
        // تحريك اللاعب
        let keys = {};
        let myX = 400, myY = 300;
        let isMoving = false;
        
        // إظهار حالة الاتصال
        const statusDiv = document.getElementById('connectionStatus');
        
        socket.on('connect', () => {
            console.log('✅ متصل بالسيرفر');
            statusDiv.style.display = 'none';
        });
        
        socket.on('connect_error', (err) => {
            console.log('❌ خطأ بالاتصال:', err.message);
            statusDiv.textContent = '❌ فشل الاتصال - جاري إعادة المحاولة...';
            statusDiv.style.display = 'block';
        });
        
        socket.on('disconnect', () => {
            console.log('⚠️ انقطع الاتصال');
            statusDiv.textContent = '⚠️ انقطع الاتصال...';
            statusDiv.style.display = 'block';
        });
        
        // استقبال البيانات الأولية
        socket.on('init', (data) => {
            myId = data.id;
            players = data.players;
            messages = data.messages || [];
            if (players[myId]) {
                myX = players[myId].x;
                myY = players[myId].y;
            }
            updateMessages();
            console.log('🎮 تم الاتصال كـ:', myId);
        });
        
        // لاعب جديد
        socket.on('playerJoined', (player) => {
            players[player.id] = player;
        });
        
        // تحريك لاعب
        socket.on('playerMoved', (data) => {
            if (players[data.id]) {
                players[data.id].x = data.x;
                players[data.id].y = data.y;
            }
        });
        
        // لاعب غادر
        socket.on('playerLeft', (id) => {
            delete players[id];
        });
        
        // رسالة جديدة
        socket.on('chatMessage', (msg) => {
            messages.push(msg);
            if (messages.length > 20) messages.shift();
            updateMessages();
        });
        
        // تحديث الرسائل
        function updateMessages() {
            const div = document.getElementById('messages');
            div.innerHTML = messages.map(m => 
                `<div class="msg"><strong style="color:${players[m.id]?.color || '#fff'}">${m.name || 'مجهول'}:</strong> ${m.text}</div>`
            ).join('');
            div.scrollTop = div.scrollHeight;
        }
        
        // التحكم بالكيبورد
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'Enter') sendMessage();
        });
        window.addEventListener('keyup', (e) => keys[e.key] = false);
        
        // أزرار التحكم باللمس - الطريقة الصحيحة
        const buttonIds = ['btnUp', 'btnLeft', 'btnRight', 'btnDown'];
        const buttonKeys = {
            'btnUp': 'ArrowUp',
            'btnLeft': 'ArrowLeft', 
            'btnRight': 'ArrowRight',
            'btnDown': 'ArrowDown'
        };
        
        buttonIds.forEach(id => {
            const btn = document.getElementById(id);
            const keyName = buttonKeys[id];
            
            // Touch start
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                keys[keyName] = true;
                btn.classList.add('pressed');
            }, { passive: false });
            
            // Touch end
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[keyName] = false;
                btn.classList.remove('pressed');
            });
            
            // Touch cancel (مثل ما يخرج الإصبع من الشاشة)
            btn.addEventListener('touchcancel', (e) => {
                keys[keyName] = false;
                btn.classList.remove('pressed');
            });
            
            // Mouse events للتجربة على الكمبيوتر
            btn.addEventListener('mousedown', (e) => {
                keys[keyName] = true;
                btn.classList.add('pressed');
            });
            btn.addEventListener('mouseup', (e) => {
                keys[keyName] = false;
                btn.classList.remove('pressed');
            });
            btn.addEventListener('mouseleave', (e) => {
                keys[keyName] = false;
                btn.classList.remove('pressed');
            });
        });
        
        // إرسال رسالة
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (text && socket.connected) {
                socket.emit('chat', text);
                input.value = '';
                input.blur(); // إخفاء الكيبورد على الموبايل
            }
        }
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        
        // حلقة اللعبة
        let lastMoveTime = 0;
        
        function gameLoop() {
            // تحريك اللاعب
            let moved = false;
            if (keys['ArrowUp'] || keys['btnUp']) { myY -= SPEED; moved = true; }
            if (keys['ArrowDown'] || keys['btnDown']) { myY += SPEED; moved = true; }
            if (keys['ArrowLeft'] || keys['btnLeft']) { myX -= SPEED; moved = true; }
            if (keys['ArrowRight'] || keys['btnRight']) { myX += SPEED; moved = true; }
            
            // حدود الشاشة
            myX = Math.max(PLAYER_SIZE, Math.min(canvas.width - PLAYER_SIZE, myX));
            myY = Math.max(PLAYER_SIZE, Math.min(canvas.height - PLAYER_SIZE, myY));
            
            // إرسال التحديث (كل 50ms عشان ما نحمّل السيرفر)
            const now = Date.now();
            if (moved && now - lastMoveTime > 50) {
                lastMoveTime = now;
                socket.emit('move', { x: myX, y: myY });
                if (players[myId]) {
                    players[myId].x = myX;
                    players[myId].y = myY;
                }
            }
            
            // رسم الخلفية
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // رسم شبكة
            ctx.strokeStyle = '#0f3460';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            
            // رسم اللاعبين
            Object.values(players).forEach(p => {
                if (!p || !p.x || !p.y) return;
                
                // الجسم
                ctx.fillStyle = p.color || '#4ECDC4';
                ctx.fillRect(p.x - PLAYER_SIZE/2, p.y - PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);
                
                // الحدود
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x - PLAYER_SIZE/2, p.y - PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);
                
                // الاسم
                ctx.fillStyle = '#fff';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p.name || 'لاعب', p.x, p.y - PLAYER_SIZE/2 - 5);
                
                // إذا كان اللاعب أنا
                if (p.id === myId) {
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(p.x - PLAYER_SIZE/2 - 3, p.y - PLAYER_SIZE/2 - 3, PLAYER_SIZE + 6, PLAYER_SIZE + 6);
                }
            });
            
            // عدد اللاعبين
            document.getElementById('playerCount').textContent = `👥 ${Object.keys(players).length} لاعب`;
            
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
        
        // تعديل حجم الشاشة
        window.addEventListener('resize', resizeCanvas);
    </script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // تفعيل Mini App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // تفعيل الألوان حسب ثيم Telegram
        tg.setHeaderColor('#1a1a2e');
        tg.setBackgroundColor('#16213e');
        
        // الحصول على بيانات المستخدم
        const user = tg.initDataUnsafe?.user;
        if (user) {
            console.log('👤 مستخدم Telegram:', user.first_name, user.last_name);
        }
        
        // منع إغلاق التطبيق بالخطأ
        tg.enableClosingConfirmation();
    </script>
</body>
</html>
