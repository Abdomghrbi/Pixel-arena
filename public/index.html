<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Arena 🎮</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0d1117;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        
        #gameCanvas {
            display: block;
        }
        
        /* خلفية الجزء العلوي */
        #topBar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(13, 17, 23, 0.95);
            border-bottom: 2px solid #e94560;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        #gameTitle {
            color: #e94560;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        
        #playerCount {
            color: #fff;
            font-size: 14px;
            background: rgba(233, 69, 96, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(233, 69, 96, 0.5);
        }
        
        /* دردشة محسّنة */
        #chatContainer {
            position: fixed;
            top: 60px;
            left: 10px;
            right: 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
            pointer-events: none;
        }
        
        .msg {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            margin: 3px 0;
            border-radius: 15px;
            font-size: 13px;
            max-width: 80%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
            border-right: 3px solid;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .msg-name {
            font-weight: bold;
            margin-left: 5px;
        }
        
        /* أزرار التحكم - دائري */
        #controls {
            position: fixed;
            bottom: 100px;
            right: 20px;
            display: grid;
            grid-template-columns: 70px 70px 70px;
            grid-template-rows: 70px 70px 70px;
            gap: 8px;
            z-index: 100;
        }
        
        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            background: rgba(233, 69, 96, 0.4);
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: all 0.1s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        
        .control-btn:active, .control-btn.pressed { 
            background: rgba(233, 69, 96, 0.8);
            transform: scale(0.9);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
        }
        
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        
        /* صندوق الدردشة السفلي */
        #chatBox {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(13, 17, 23, 0.95);
            padding: 12px;
            display: flex;
            gap: 10px;
            z-index: 100;
            border-top: 2px solid #e94560;
            backdrop-filter: blur(10px);
        }
        
        #chatInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid rgba(233, 69, 96, 0.3);
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #chatInput:focus {
            border-color: #e94560;
        }
        
        #chatInput::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        #sendBtn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: #e94560;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            transition: all 0.2s;
        }
        
        #sendBtn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.4);
        }
        
        /* حالة الاتصال */
        #connectionStatus {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #e94560;
            padding: 25px 40px;
            border-radius: 15px;
            font-size: 18px;
            z-index: 200;
            display: none;
            border: 2px solid #e94560;
            text-align: center;
        }
        
        #connectionStatus.show {
            display: block;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* تأثيرات الجسيمات */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(233, 69, 96, 0.6);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="topBar">
        <div id="gameTitle">🔥 Pixel Arena</div>
        <div id="playerCount">👥 0 لاعب</div>
    </div>
    
    <div id="chatContainer"></div>
    
    <div id="connectionStatus">🔄 جاري الاتصال...</div>
    
    <div id="controls">
        <button class="control-btn" id="btnUp">▲</button>
        <button class="control-btn" id="btnLeft">◀</button>
        <button class="control-btn" id="btnRight">▶</button>
        <button class="control-btn" id="btnDown">▼</button>
    </div>
    
    <div id="chatBox">
        <input type="text" id="chatInput" placeholder="اكتب رسالة..." maxlength="100">
        <button id="sendBtn">📤</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        
        const socket = io({
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: 10,
    reconnectionDelay: 1000,
    timeout: 20000
});
        
        let myId = null;
        let players = {};
        let messages = [];
        const PLAYER_SIZE = 35;
        const SPEED = 4;
        let keys = {};
        let myX = 400, myY = 300;
        let lastMoveTime = 0;
        
        const statusDiv = document.getElementById('connectionStatus');
        
        socket.on('connect', () => {
            statusDiv.classList.remove('show');
        });
        
        socket.on('connect_error', () => {
            statusDiv.textContent = '❌ فشل الاتصال - جاري إعادة المحاولة...';
            statusDiv.classList.add('show');
        });
        
        socket.on('disconnect', () => {
            statusDiv.textContent = '⚠️ انقطع الاتصال...';
            statusDiv.classList.add('show');
        });
        
        socket.on('init', (data) => {
            myId = data.id;
            players = data.players;
            messages = data.messages || [];
            if (players[myId]) {
                myX = players[myId].x;
                myY = players[myId].y;
            }
            updateMessages();
        });
        
        socket.on('playerJoined', (player) => {
            players[player.id] = player;
            createParticles(player.x, player.y, player.color);
        });
        
        socket.on('playerMoved', (data) => {
            if (players[data.id]) {
                players[data.id].x = data.x;
                players[data.id].y = data.y;
            }
        });
        
        socket.on('playerLeft', (id) => {
            delete players[id];
        });
        
        socket.on('chatMessage', (msg) => {
            messages.push(msg);
            if (messages.length > 20) messages.shift();
            updateMessages();
        });
        
        function updateMessages() {
            const div = document.getElementById('chatContainer');
            div.innerHTML = messages.map(m => {
                const color = players[m.id]?.color || '#fff';
                return `<div class="msg" style="border-right-color: ${color}">
                    <span class="msg-name" style="color: ${color}">${m.name || 'لاعب'}:</span>
                    ${m.text}
                </div>`;
            }).join('');
            div.scrollTop = div.scrollHeight;
        }
        
        // التحكم
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'Enter') sendMessage();
        });
        window.addEventListener('keyup', (e) => keys[e.key] = false);
        
        const buttonKeys = {
            'btnUp': 'ArrowUp',
            'btnLeft': 'ArrowLeft', 
            'btnRight': 'ArrowRight',
            'btnDown': 'ArrowDown'
        };
        
        Object.keys(buttonKeys).forEach(id => {
            const btn = document.getElementById(id);
            const keyName = buttonKeys[id];
            
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[keyName] = true;
                btn.classList.add('pressed');
            }, { passive: false });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[keyName] = false;
                btn.classList.remove('pressed');
            });
            
            btn.addEventListener('touchcancel', () => {
                keys[keyName] = false;
                btn.classList.remove('pressed');
            });
            
            btn.addEventListener('mousedown', () => {
                keys[keyName] = true;
                btn.classList.add('pressed');
            });
            btn.addEventListener('mouseup', () => {
                keys[keyName] = false;
                btn.classList.remove('pressed');
            });
            btn.addEventListener('mouseleave', () => {
                keys[keyName] = false;
                btn.classList.remove('pressed');
            });
        });
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (text && socket.connected) {
                socket.emit('chat', text);
                input.value = '';
                input.blur();
            }
        }
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        
        // جسيمات
        let particles = [];
        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    color
                });
            }
        }
        
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                return p.life > 0;
            });
        }
        
        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        // رسم شخصية اللاعب
        function drawPlayer(p, isMe) {
            const x = p.x;
            const y = p.y;
            const size = PLAYER_SIZE;
            
            // ظل
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(x, y + size/2 + 5, size/2, size/4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // الجسم (دائرة)
            ctx.fillStyle = p.color || '#4ECDC4';
            ctx.beginPath();
            ctx.arc(x, y, size/2, 0, Math.PI * 2);
            ctx.fill();
            
            // حدود الجسم
            ctx.strokeStyle = isMe ? '#FFD700' : '#fff';
            ctx.lineWidth = isMe ? 3 : 2;
            ctx.beginPath();
            ctx.arc(x, y, size/2, 0, Math.PI * 2);
            ctx.stroke();
            
            // عيون
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x - 8, y - 5, 5, 0, Math.PI * 2);
            ctx.arc(x + 8, y - 5, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // بؤبؤ العين
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x - 8, y - 5, 2.5, 0, Math.PI * 2);
            ctx.arc(x + 8, y - 5, 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            // ابتسامة
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y + 3, 8, 0.2 * Math.PI, 0.8 * Math.PI);
            ctx.stroke();
            
            // اسم اللاعب
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 4;
            ctx.fillText(p.name || 'لاعب', x, y - size/2 - 10);
            ctx.shadowBlur = 0;
            
            // إذا كان اللاعب أنا - سهم
            if (isMe) {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.moveTo(x, y - size/2 - 20);
                ctx.lineTo(x - 6, y - size/2 - 30);
                ctx.lineTo(x + 6, y - size/2 - 30);
                ctx.fill();
            }
        }
        
        // رسم الخلفية
        function drawBackground() {
            // خلفية داكنة
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // شبكة ناعمة
            ctx.strokeStyle = 'rgba(233, 69, 96, 0.08)';
            ctx.lineWidth = 1;
            const gridSize = 60;
            
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // نقاط مضيئة عشوائية
            ctx.fillStyle = 'rgba(233, 69, 96, 0.15)';
            for (let i = 0; i < 20; i++) {
                const px = (Math.sin(i * 1.5) * 0.5 + 0.5) * canvas.width;
                const py = (Math.cos(i * 2.3) * 0.5 + 0.5) * canvas.height;
                ctx.beginPath();
                ctx.arc(px, py, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function gameLoop() {
            let moved = false;
            if (keys['ArrowUp'] || keys['btnUp']) { myY -= SPEED; moved = true; }
            if (keys['ArrowDown'] || keys['btnDown']) { myY += SPEED; moved = true; }
            if (keys['ArrowLeft'] || keys['btnLeft']) { myX -= SPEED; moved = true; }
            if (keys['ArrowRight'] || keys['btnRight']) { myX += SPEED; moved = true; }
            
            myX = Math.max(PLAYER_SIZE, Math.min(canvas.width - PLAYER_SIZE, myX));
            myY = Math.max(PLAYER_SIZE + 50, Math.min(canvas.height - PLAYER_SIZE - 120, myY));
            
            const now = Date.now();
            if (moved && now - lastMoveTime > 50) {
                lastMoveTime = now;
                socket.emit('move', { x: myX, y: myY });
                if (players[myId]) {
                    players[myId].x = myX;
                    players[myId].y = myY;
                }
            }
            
            drawBackground();
            updateParticles();
            drawParticles();
            
            // رسم اللاعبين
            Object.values(players).forEach(p => {
                if (!p || !p.x || !p.y) return;
                drawPlayer(p, p.id === myId);
            });
            
            document.getElementById('playerCount').textContent = `👥 ${Object.keys(players).length} لاعب`;
            
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
        window.addEventListener('resize', resizeCanvas);
    </script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0d1117');
        tg.setBackgroundColor('#0d1117');
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            console.log('👤 Telegram:', user.first_name);
        }
    </script>
</body>
</html>
